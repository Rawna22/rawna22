name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: generate snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Rawna22
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?color_snake=00FF88&color_dots=#0d1117,#161b22,#1a2332,#1f3040,#00ff88

      - name: prepare output branch
        run: |
          git init temp
          cd temp
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b output
          cp ../dist/github-contribution-grid-snake-dark.svg .
          git add .
          git commit -m "Update snake animation [$(date -u +%Y-%m-%d)]"
          git push --force "https://${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" output
